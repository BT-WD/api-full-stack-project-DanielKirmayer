<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Mood Matcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Cat Mood Matcher</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="favorites.html">Favorites</a>
        </nav>
    </header>

    <main>
        <section class="card">
            <h2>Select Your Mood</h2>
            <div class="mood-buttons">
                <button class="mood-btn">Happy</button>
                <button class="mood-btn">Sad</button>
                <button class="mood-btn">Sleepy</button>
                <button class="mood-btn">Playful</button>
                <button class="mood-btn">Angry</button>
            </div>
        </section>

        <section class="card">
            <h2>Your Cat Match</h2>
            <div id="cat-image-container">
                <img id="cat-image" src="placeholder.jpg" alt="Cat Image">
            </div>
            <button id="save-btn" class="primary-btn">Save to Favorites</button>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
